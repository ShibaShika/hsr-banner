name: Auto Update HSR Banner Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    
    steps:
      - name: 下載專案程式碼
        uses: actions/checkout@v4  # 建議從 v3 升級到 v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5  # 建議從 v4 升級到 v5
        with:
          python-version: '3.10'

      - name: 安裝所需套件
        run: |
          python -m pip install --upgrade pip
          pip install requests curl_cffi beautifulsoup4

      - name: 執行更新腳本
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python update_gist.py
