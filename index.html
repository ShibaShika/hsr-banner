<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩壞：星穹鐵道 - 限定躍遷一覽表</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --th-bg: #222;
            
            --elem-fire: #fca5a5;      
            --elem-ice: #93c5fd;       
            --elem-lightning: #d8b4fe; 
            --elem-wind: #86efac;      
            --elem-physical: #cbd5e1;  
            --elem-quantum: #c4b5fd;   
            --elem-imaginary: #fef08a; 
            --elem-unknown: #64748b;   
        }
        
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; position: relative; }
        h1 { text-align: center; color: var(--text); margin: 10px 0 20px 0; font-size: 24px; font-weight: bold; }
        
        .table-wrap { overflow-x: auto; max-height: calc(100vh - 70px); border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        table { border-collapse: collapse; min-width: 100%; text-align: center; font-size: 12px; background: var(--surface); }
        th, td { padding: 3px 2px; border: 1px solid var(--border); white-space: nowrap; min-width: 26px; }
        
        thead th { background: var(--th-bg); position: sticky; z-index: 10; font-weight: 600; color: #fff; line-height: 1.1; }
        thead tr:nth-child(1) th { top: 0; font-size: 10px; color: #aaa; border-bottom: none; padding-bottom: 1px; padding-top: 4px; }
        thead tr:nth-child(2) th { top: 25px; border-top: none; padding-top: 2px; font-size: 11px; }
        
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 11; text-align: left; box-shadow: 2px 0 5px rgba(0,0,0,0.4); padding: 0; }
        thead tr:nth-child(1) th:first-child { z-index: 12; top: 0; background: var(--th-bg); }
        thead tr:nth-child(2) th:first-child { z-index: 12; top: 25px; background: var(--th-bg); }

        .char-info-cell { display: flex; align-items: center; padding: 3px 6px; color: #000; font-weight: 600; }
        .char-seq { width: 22px; text-align: center; font-size: 13px; opacity: 0.8; }
        .char-path-icon { width: 20px; height: 20px; margin-right: 4px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3)); }
        .char-avatar { width: 26px; height: 26px; border-radius: 4px; object-fit: cover; border: 1px solid rgba(0,0,0,0.2); margin-right: 6px; background: #222; }
        .grid-avatar { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; border: 1px solid rgba(0,0,0,0.2); vertical-align: middle; background: #222; display: block; margin: 0 auto; }
        .char-name { font-size: 13px; min-width: 75px; }

        .bg-火 { background-color: var(--elem-fire); }
        .bg-冰 { background-color: var(--elem-ice); }
        .bg-雷 { background-color: var(--elem-lightning); }
        .bg-風 { background-color: var(--elem-wind); }
        .bg-物理 { background-color: var(--elem-physical); }
        .bg-量子 { background-color: var(--elem-quantum); }
        .bg-虛數 { background-color: var(--elem-imaginary); }
        .bg-未知 { background-color: var(--elem-unknown); color: #fff !important; }

        /* 狀態顏色 */
        .img-cell { background-color: #1e1e1e; padding: 2px; }
        .collab-empty { color: transparent; } 
        .term-pool { background-color: #2e436e; color: #a5c8ff; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
        .term-pool-empty { background-color: #1a2233; color: transparent; }
        .term-shop { background-color: #6e4e2e; color: #ffdbb0; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
        .term-shop-empty { background-color: #33261a; color: transparent; }
        .none { background-color: #161616; color: #333; }
        .w-low { background-color: #242424; color: #888; }
        .w-med { background-color: #3b2818; color: #ccc; }
        .w-high { background-color: #571a1a; color: #eee; }
        .w-crit { background-color: #7f1212; color: #fff; font-weight: bold; }
        
        tr:hover td:not(.img-cell):not(.collab-empty):not(.term-pool-empty):not(.term-shop-empty):not(:first-child) { filter: brightness(1.4); transition: all 0.2s; }
        .update-date { position: absolute; right: 15px; top: 15px; font-size: 13px; color: #888; }
    
        /* 十字高亮效果 */
        .col-highlight { filter: brightness(1.3); transition: filter 0.15s; }

    </style>
</head>

        // 載入時自動反轉陣列，讓最新角色顯示在最上方，且序號保持正確
        const CHARACTERS = [...RAW_CHARACTERS].reverse();

        function formatHeaderDate(dateStr) {
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                const yyyy = '20' + parts[0];
                const mmdd = parts[1] + parts[2];
                return `${yyyy}<br>${mmdd}`;
            }
            return dateStr;
        }

        const table = document.getElementById('tracker');
        const patchesList = PATCH_DATA.map(p => p.patch);
        const totalChars = CHARACTERS.length;
        
        let html = '<thead><tr><th></th>';
        [...PATCH_DATA].reverse().forEach(p => {
            html += `<th>${formatHeaderDate(p.date)}</th>`;
        });
        html += '</tr><tr><th><div style="text-align:center; padding: 0 4px;">序號 / 角色資訊</div></th>';
        [...PATCH_DATA].reverse().forEach(p => html += `<th>${p.patch}</th>`);
        html += '</tr></thead><tbody>';
        
        CHARACTERS.forEach((char, index) => {
            const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(char.name)}&background=random&color=fff&size=56&bold=true`;
            const avatarUrl = char.avatar ? char.avatar : fallbackUrl;
            const pathIconUrl = PATH_ICONS[char.path] || "";
            const seqNum = totalChars - index;
            
            html += `<tr>
                <td class="bg-${char.elem}">
                    <div class="char-info-cell">
                        <span class="char-seq">${seqNum}</span>
                        ${pathIconUrl ? `<img src="${pathIconUrl}" class="char-path-icon" title="${char.path}">` : '<div class="char-path-icon"></div>'}
                        <img src="${avatarUrl}" class="char-avatar" alt="${char.name}" onerror="this.onerror=null; this.src='${fallbackUrl}';">
                        <span class="char-name">${char.name}</span>
                    </div>
                </td>`;
            
            let history = [];
            let currentGap = 0;
            let hasReleased = false;

            patchesList.forEach(patch => {
                let cellStatus = 'NONE';
                
                if (char.term) {
                    const termIdx = patchesList.indexOf(char.term.patch);
                    const pIdx = patchesList.indexOf(patch);
                    if (pIdx >= termIdx) {
                        if (pIdx === termIdx) {
                            history.push({ status: 'TERM_START', type: char.term.type });
                        } else {
                            history.push({ status: 'TERM_EMPTY', type: char.term.type });
                        }
                        return; // 終止後就不會再有復刻，直接跳過後續判斷
                    }
                }
                
                if (char.isCollab) {
                    const collabStart = char.isCollab;
                    const sIdx = patchesList.indexOf(collabStart);
                    const pIdx = patchesList.indexOf(patch);
                    const lIdx = patchesList.length - 1; 

                    if (pIdx >= sIdx) {
                        if (pIdx === sIdx || pIdx === lIdx) {
                            cellStatus = 'COLLAB_START'; 
                        } else {
                            cellStatus = 'COLLAB_EMPTY'; 
                        }
                    }
                }

                if (cellStatus === 'COLLAB_START') {
                    history.push({ status: 'COLLAB' });
                } else if (cellStatus === 'COLLAB_EMPTY') {
                    history.push({ status: 'COLLAB_EMPTY' });
                } else if (char.runs && char.runs.includes(patch)) {
                    hasReleased = true;
                    currentGap = 0;
                    history.push({ status: 'UP' });
                } else {
                    if (hasReleased) {
                        currentGap++;
                        history.push({ status: 'WAIT', gap: currentGap });
                    } else {
                        history.push({ status: 'NONE' });
                    }
                }
            });

            history.reverse().forEach(cell => {
                let cls = '';
                let content = '';
                if (cell.status === 'UP' || cell.status === 'COLLAB') {
                    cls = 'img-cell';
                    content = `<img src="${avatarUrl}" class="grid-avatar" alt="${char.name}" onerror="this.onerror=null; this.src='${fallbackUrl}';">`;
                } else if (cell.status === 'COLLAB_EMPTY') {
                    cls = `collab-empty bg-${char.elem}`;
                    content = '';
                } else if (cell.status === 'TERM_START') {
                    cls = cell.type === 'pool' ? 'term-pool' : 'term-shop';
                    content = cell.type === 'pool' ? '星緣' : '聚靈';
                } else if (cell.status === 'TERM_EMPTY') {
                    cls = cell.type === 'pool' ? 'term-pool-empty' : 'term-shop-empty';
                    content = '';
                } else if (cell.status === 'NONE') {
                    cls = 'none';
                    content = '-';
                } else {
                    content = cell.gap;
                    if (cell.gap <= 3) cls = 'w-low';
                    else if (cell.gap <= 7) cls = 'w-med';
                    else if (cell.gap <= 12) cls = 'w-high';
                    else cls = 'w-crit';
                }
                html += `<td class="${cls}">${content}</td>`;
            });
            html += `</tr>`;
        });
        html += '</tbody>';
        
        table.innerHTML = html;

        // 十字高亮互動效果
        const trackerTable = document.getElementById('tracker');
        trackerTable.addEventListener('mouseover', (e) => {
            const cell = e.target.closest('td, th');
            if (!cell) return;
            const colIndex = cell.cellIndex;
            const rows = trackerTable.rows;
            for (let i = 0; i < rows.length; i++) {
                const c = rows[i].cells[colIndex];
                if (c) c.classList.add('col-highlight');
            }
        });

        trackerTable.addEventListener('mouseout', (e) => {
            const cell = e.target.closest('td, th');
            if (!cell) return;
            const colIndex = cell.cellIndex;
            const rows = trackerTable.rows;
            for (let i = 0; i < rows.length; i++) {
                const c = rows[i].cells[colIndex];
                if (c) c.classList.remove('col-highlight');
            }
        });

    </script>
</body>
</html>
