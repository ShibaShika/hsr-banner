<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩壞：星穹鐵道 - 限定躍遷一覽表</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --up: #facc15;
            --th-bg: #2a2a2a;
        }
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
        }
        h1 { 
            text-align: center; color: var(--text); 
            margin: 25px 0; font-size: 28px; font-weight: bold;
        }
        
        .table-wrap { 
            overflow-x: auto; 
            max-height: calc(100vh - 100px); 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        table { 
            border-collapse: collapse; min-width: 100%; 
            text-align: center; font-size: 14px; 
            background: var(--surface); 
        }
        th, td { 
            padding: 10px 8px; border: 1px solid var(--border); 
            white-space: nowrap; min-width: 40px; 
        }
        
        /* 表頭固定設定 */
        thead th { 
            background: var(--th-bg); position: sticky; 
            z-index: 10; font-weight: 600; color: #fff; 
        }
        /* 第一列：日期 */
        thead tr:nth-child(1) th { 
            top: 0; font-size: 12px; color: #aaa; 
            border-bottom: none; padding-bottom: 4px; padding-top: 8px;
        }
        /* 第二列：版本號 */
        thead tr:nth-child(2) th { 
            top: 32px; border-top: none; padding-top: 4px;
        }
        
        /* 鎖定最左側角色欄 */
        th:first-child, td:first-child { 
            position: sticky; left: 0; background: var(--th-bg); 
            z-index: 11; text-align: left; padding-left: 15px; padding-right: 25px;
            font-weight: bold; box-shadow: 2px 0 5px rgba(0,0,0,0.4); 
        }
        /* 左上角交叉點，需要最高層級 */
        thead tr:nth-child(1) th:first-child { z-index: 12; top: 0; }
        thead tr:nth-child(2) th:first-child { z-index: 12; top: 32px; }

        td:first-child { background: var(--surface); }
        tr:hover td:first-child { background: #252525; }
        
        /* 大頭貼樣式設定 */
        .char-cell { display: flex; align-items: center; gap: 12px; }
        .char-avatar { 
            width: 36px; height: 36px; border-radius: 6px; 
            object-fit: cover; background: #444; border: 1px solid #555; 
        }
        .char-name { font-size: 15px; }

        /* 狀態顏色 */
        .up { background-color: var(--up); color: #000; font-weight: 800; font-size: 15px; }
        .none { background-color: #1a1a1a; color: #444; }
        .w-low { background-color: #242424; color: #888; }
        .w-med { background-color: #3b2818; color: #ccc; }
        .w-high { background-color: #571a1a; color: #eee; }
        .w-crit { background-color: #7f1212; color: #fff; font-weight: bold; font-size: 15px; }
        
        tr:hover td:not(.up):not(:first-child) { filter: brightness(1.3); transition: all 0.2s; }
    </style>
</head>
<body>

            { name: "羅刹", runs: ["4.3下", "3.4上", "2.6上"] },

            { name: "希兒", runs: ["4.3下", "3.0下", "2.4下"] }
        ];

        // ==========================================
        // 渲染邏輯
        // ==========================================
        const table = document.getElementById('tracker');
        const patchesList = PATCH_DATA.map(p => p.patch);
        
        // 建立表頭 (第一行日期、第二行版本號)
        let html = '<thead><tr><th></th>';
        [...PATCH_DATA].reverse().forEach(p => html += `<th>${p.date}</th>`);
        html += '</tr><tr><th>角色</th>';
        [...PATCH_DATA].reverse().forEach(p => html += `<th>${p.patch}</th>`);
        html += '</tr></thead><tbody>';
        
        // 建立資料行
        CHARACTERS.forEach(char => {
            const localizedName = getLocalizedName(char.name);
            // 透過 UI-Avatars 產生暫時的大頭貼，未來爬取到真實 URL 後可以替換
            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(localizedName)}&background=random&color=fff&size=64&bold=true`;
            
            html += `<tr>
                <td>
                    <div class="char-cell">
                        <img src="${avatarUrl}" class="char-avatar" alt="${localizedName}">
                        <span class="char-name">${localizedName}</span>
                    </div>
                </td>`;
            
            let history = [];
            let currentGap = 0;
            let hasReleased = false;

            patchesList.forEach(patch => {
                if (char.runs.includes(patch)) {
                    hasReleased = true;
                    currentGap = 0;
                    history.push({ status: 'UP', text: 'UP' });
                } else {
                    if (hasReleased) {
                        currentGap++;
                        history.push({ status: 'WAIT', gap: currentGap });
                    } else {
                        history.push({ status: 'NONE' });
                    }
                }
            });

            history.reverse().forEach(cell => {
                let cls = '';
                let text = '';
                
                if (cell.status === 'UP') {
                    cls = 'up'; text = 'UP';
                } else if (cell.status === 'NONE') {
                    cls = 'none'; text = '-';
                } else {
                    text = cell.gap;
                    if (cell.gap <= 3) cls = 'w-low';
                    else if (cell.gap <= 7) cls = 'w-med';
                    else if (cell.gap <= 12) cls = 'w-high';
                    else cls = 'w-crit';
                }
                html += `<td class="${cls}">${text}</td>`;
            });
            html += `</tr>`;
        });
        html += '</tbody>';
        table.innerHTML = html;
    </script>
</body>
</html>
