    <style>
        :root {
            /* 基礎暗色系 */
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --up: #facc15;
            --th-bg: #222;
            
            /* 屬性底色 (參考官方與截圖配色) */
            --elem-fire: #fca5a5;      /* 火 - 淺紅 */
            --elem-ice: #93c5fd;       /* 冰 - 淺藍 */
            --elem-lightning: #d8b4fe; /* 雷 - 淺紫 */
            --elem-wind: #86efac;      /* 風 - 淺綠 */
            --elem-physical: #d1d5db;  /* 物理 - 淺灰 */
            --elem-quantum: #c4b5fd;   /* 量子 - 靛紫 */
            --elem-imaginary: #fde047; /* 虛數 - 淺黃 */
            --elem-unknown: #444444;   /* 未知 */
        }
        
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; 
        }
        h1 { 
            text-align: center; color: var(--text); 
            margin: 10px 0 20px 0; font-size: 24px; font-weight: bold;
        }
        
        /* 表格外框與滾動設定 */
        .table-wrap { 
            overflow-x: auto; 
            max-height: calc(100vh - 70px); 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
        }
        table { 
            border-collapse: collapse; min-width: 100%; 
            text-align: center; font-size: 13px; /* 字體縮小，版面更緊湊 */
            background: var(--surface); 
        }
        
        /* 儲存格縮減 Padding 讓表格變矮變窄 */
        th, td { 
            padding: 4px 6px; 
            border: 1px solid var(--border); 
            white-space: nowrap; min-width: 30px; 
        }
        
        /* --- 表頭固定設定 --- */
        thead th { 
            background: var(--th-bg); position: sticky; 
            z-index: 10; font-weight: 600; color: #fff; 
        }
        /* 第一列：日期 */
        thead tr:nth-child(1) th { 
            top: 0; font-size: 11px; color: #aaa; 
            border-bottom: none; padding-bottom: 2px; padding-top: 6px;
        }
        /* 第二列：版本號 */
        thead tr:nth-child(2) th { 
            top: 25px; border-top: none; padding-top: 2px;
        }
        
        /* --- 最左側角色資訊欄固定 --- */
        th:first-child, td:first-child { 
            position: sticky; left: 0; 
            z-index: 11; text-align: left; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.4); 
            padding: 0; /* 內部用 Flex 控制間距 */
        }
        /* 左上角交叉點，需要最高層級 */
        thead tr:nth-child(1) th:first-child { z-index: 12; top: 0; background: var(--th-bg); }
        thead tr:nth-child(2) th:first-child { z-index: 12; top: 25px; background: var(--th-bg); }

        /* --- 複合角色資訊格 (Flexbox) --- */
        .char-info-cell {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            color: #000; /* 屬性底色較亮，字體改為黑色 */
            font-weight: 600;
        }
        .char-seq { width: 22px; text-align: center; font-size: 14px; opacity: 0.8; }
        .char-path-icon { width: 22px; height: 22px; margin-right: 6px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3)); }
        .char-avatar { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 1px solid rgba(0,0,0,0.2); margin-right: 8px; }
        .char-name { font-size: 14px; min-width: 80px; }

        /* 屬性底色 */
        .bg-Fire { background-color: var(--elem-fire); }
        .bg-Ice { background-color: var(--elem-ice); }
        .bg-Lightning { background-color: var(--elem-lightning); }
        .bg-Wind { background-color: var(--elem-wind); }
        .bg-Physical { background-color: var(--elem-physical); }
        .bg-Quantum { background-color: var(--elem-quantum); }
        .bg-Imaginary { background-color: var(--elem-imaginary); }
        .bg-Unknown { background-color: var(--elem-unknown); color: #fff !important; }

        /* --- 右側卡池狀態樣式 --- */
        .up { background-color: var(--up); color: #000; font-weight: 800; font-size: 14px; }
        .none { background-color: #161616; color: #333; }
        .w-low { background-color: #242424; color: #888; }
        .w-med { background-color: #3b2818; color: #ccc; }
        .w-high { background-color: #571a1a; color: #eee; }
        .w-crit { background-color: #7f1212; color: #fff; font-weight: bold; }
        
        tr:hover td:not(.up):not(:first-child) { filter: brightness(1.4); transition: all 0.2s; }
        tr:hover td:first-child { filter: brightness(0.95); }
    </style>

                        <span class="char-name">${localizedName}</span>
                    </div>
                </td>`;
            
            let history = [];
            let currentGap = 0;
            let hasReleased = false;

            patchesList.forEach(patch => {
                if (char.runs.includes(patch)) {
                    hasReleased = true;
                    currentGap = 0;
                    history.push({ status: 'UP', text: 'UP' });
                } else {
                    if (hasReleased) {
                        currentGap++;
                        history.push({ status: 'WAIT', gap: currentGap });
                    } else {
                        history.push({ status: 'NONE' });
                    }
                }
            });

            history.reverse().forEach(cell => {
                let cls = '';
                let text = '';
                
                if (cell.status === 'UP') {
                    cls = 'up'; text = 'UP';
                } else if (cell.status === 'NONE') {
                    cls = 'none'; text = '-';
                } else {
                    text = cell.gap;
                    if (cell.gap <= 3) cls = 'w-low';
                    else if (cell.gap <= 7) cls = 'w-med';
                    else if (cell.gap <= 12) cls = 'w-high';
                    else cls = 'w-crit';
                }
                html += `<td class="${cls}">${text}</td>`;
            });
            html += `</tr>`;
        });
        html += '</tbody>';
        table.innerHTML = html;
    </script>
</body>
</html>
